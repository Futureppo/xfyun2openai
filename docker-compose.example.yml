services:
  xfyun2openai:
    image: ${IMAGE_REPOSITORY:-ghcr.io/futureppo/xfyun2openai}:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: xfyun2openai
    ports:
      - "8787:8787"
    env_file:
      - ./.env
    environment:
      CONFIG_PATH: /app/config.yaml
      TZ: Asia/Shanghai
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8787/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
